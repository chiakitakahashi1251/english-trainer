<!DOCTYPE html>
<html>
<head>
  <title>English Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- START SCREEN -->
  <div id="startScreen" class="card">

    <h1>English Trainer</h1>

    <!-- MODE -->
    <h3>MODE</h3>

    <label class="option">
      <input type="radio" name="mode" value="enToJp" checked>
      <span>EN → JA</span>
    </label>

    <label class="option">
      <input type="radio" name="mode" value="jpToEn">
      <span>JA → EN</span>
    </label>

    <hr>

    <!-- HOW MANY -->
    <h3>HOW MANY</h3>

    <label class="option">
      <input type="radio" name="limit" value="10" checked>
      <span>10 Questions</span>
    </label>

    <label class="option">
      <input type="radio" name="limit" value="20">
      <span>20 Questions</span>
    </label>

    <label class="option">
      <input type="radio" name="limit" value="-1">
      <span>Infinity</span>
    </label>

    <label class="option">
      <input type="radio" name="limit" value="custom">
      <span>Custom</span>
    </label>

    <input id="customLimit" type="number" placeholder="Enter number" class="hidden">

    <button onclick="startApp()">START</button>

  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="card hidden">

    <h2 id="question"></h2>

    <!-- 4択 -->
    <div id="choices"></div>

    <p id="result"></p>

    <p>
      Score: <span id="score">0</span> |
      Streak: <span id="streak">0</span>
    </p>

  </div>

  <!-- END SCREEN -->
  <div id="endScreen" class="card hidden" style="text-align:center;">

    <h2>RESULT</h2>

    <p>Score: <span id="finalScore"></span></p>
    <p>Streak: <span id="finalStreak"></span></p>

    <!-- 間違い復習 -->
    <div id="reviewSection" class="hidden" style="margin-top:20px;">
      <h3>Review Mistakes</h3>
      <div id="reviewList"></div>
    </div>

    <button onclick="restartGame()">Try again</button>
    <button onclick="backToMenu()">Back to menu</button>

  </div>

</div>

<script src="phrases.js"></script>
<script src="script.js"></script>
</body>
</html>
